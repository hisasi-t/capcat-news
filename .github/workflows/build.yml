name: 朝刊生成

on:
  schedule:
    - cron: '30 21 * * *'  # 毎朝 6:30 JST
  workflow_dispatch:        # 手動実行ボタン

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: feedparser をインストール
        run: pip install feedparser

      - name: ニュース生成
        run: python news.py

      - name: index.html をコミット & プッシュ
        run: |
          git config user.name "capcat-bot"
          git config user.email "bot@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "📰 $(TZ=Asia/Tokyo date +'%Y-%m-%d') の朝刊"
          git push
